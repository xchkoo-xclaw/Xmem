name: Release

on:
  push:
    tags:
      - "frontend/v*"
      - "backend/v*"
      - "electron/v*"
      - "xmem/v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build_push_images:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref_name, 'electron/') }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image targets
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#*/}"
          prefix="${tag%%/*}"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          if [ "$prefix" = "backend" ]; then
            echo "PUSH_BACKEND=true" >> "$GITHUB_ENV"
            echo "PUSH_FRONTEND=false" >> "$GITHUB_ENV"
          elif [ "$prefix" = "frontend" ]; then
            echo "PUSH_BACKEND=false" >> "$GITHUB_ENV"
            echo "PUSH_FRONTEND=true" >> "$GITHUB_ENV"
          elif [ "$prefix" = "xmem" ]; then
            echo "PUSH_BACKEND=true" >> "$GITHUB_ENV"
            echo "PUSH_FRONTEND=true" >> "$GITHUB_ENV"
            echo "PUSH_LATEST=true" >> "$GITHUB_ENV"
          else
            echo "PUSH_BACKEND=false" >> "$GITHUB_ENV"
            echo "PUSH_FRONTEND=false" >> "$GITHUB_ENV"
          fi
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          backend_tags="ghcr.io/${owner}/xmem:${version}-backend"
          frontend_tags="ghcr.io/${owner}/xmem:${version}-frontend"
          if [ "$prefix" = "xmem" ]; then
            backend_tags="${backend_tags},ghcr.io/${owner}/xmem:latest-backend"
            frontend_tags="${frontend_tags},ghcr.io/${owner}/xmem:latest-frontend"
          fi
          echo "BACKEND_TAGS=$backend_tags" >> "$GITHUB_ENV"
          echo "FRONTEND_TAGS=$frontend_tags" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        if: ${{ env.PUSH_BACKEND == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_TAGS }}

      - name: Build and push frontend
        if: ${{ env.PUSH_FRONTEND == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_TAGS }}
          build-args: |
            VITE_API_URL=/api
          no-cache: true

  github_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute release name
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          name="$tag"
          case "$tag" in
            frontend/*) name="frontend ${tag#frontend/}" ;;
            backend/*) name="backend ${tag#backend/}" ;;
            electron/*) name="electron ${tag#electron/}" ;;
            xmem/*) name="xmem ${tag#xmem/}" ;;
          esac
          echo "RELEASE_NAME=$name" >> "$GITHUB_ENV"

      - name: Compute umbrella release body (xmem tag)
        if: startsWith(github.ref_name, 'xmem/')
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          root = pathlib.Path('.')

          def read_json(path: pathlib.Path) -> str:
              with path.open('r', encoding='utf-8') as f:
                  return json.load(f).get('version', '').strip()

          def read_backend_version(path: pathlib.Path) -> str:
              try:
                  import tomllib  # py>=3.11
              except Exception:  # pragma: no cover
                  import tomli as tomllib
              with path.open('rb') as f:
                  data = tomllib.load(f)
              return (data.get('project') or {}).get('version', '').strip()

          frontend_version = read_json(root / 'frontend' / 'package.json')
          electron_version = read_json(root / 'electron' / 'package.json')
          backend_version = read_backend_version(root / 'backend' / 'pyproject.toml')

          tag = os.environ.get('GITHUB_REF_NAME', '').strip()

          body = "\n".join([
              f"总版本：{tag}",
              "",
              "组件版本：",
              f"- frontend: v{frontend_version}",
              f"- backend: v{backend_version}",
              f"- electron: v{electron_version}",
          ])

          env_path = os.environ.get('GITHUB_ENV')
          if not env_path:
              print(body)
              sys.exit(0)

          with open(env_path, 'a', encoding='utf-8') as f:
              f.write("RELEASE_BODY<<__EOF__\n")
              f.write(body)
              f.write("\n__EOF__\n")
          PY

      - name: Create GitHub release (component tag)
        if: ${{ !startsWith(github.ref_name, 'xmem/') }}
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          generate_release_notes: true
          make_latest: false

      - name: Create GitHub release (xmem tag)
        if: startsWith(github.ref_name, 'xmem/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_BODY }}
          generate_release_notes: true
          make_latest: false
