name: Deploy to Aliyun

on:
  release:
    types: [published] 

  workflow_dispatch:  
  # push:
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      startsWith(github.event.release.tag_name, 'frontend/')
      || startsWith(github.event.release.tag_name, 'backend/')
      || startsWith(github.event.release.tag_name, 'xmem/')

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            cd /home/xmem/Xmem
            git pull origin main
            docker compose build --progress plain
            docker compose up -d
