name: Deploy to Aliyun

on:
  release:
    types: [published] 

  workflow_dispatch:
    inputs:
      ref:
        type: string
        default: ""
      compose_build:
        type: boolean
        default: true
  # push:
  #   branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'xmem/'))

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            cd /home/xmem/Xmem
            ref="${{ github.event.inputs.ref }}"
            run_build="${{ github.event.inputs.compose_build }}"
            git fetch --all --tags
            if [ -n "$ref" ]; then
              git checkout --force "$ref"
            else
              git checkout --force main
              git pull origin main
            fi
            if [ "$run_build" = "true" ]; then
              docker compose build --progress plain
            fi
            docker compose up -d
